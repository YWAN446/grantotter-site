<body>
<div id="root"></div>

<script>
window.__TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "heroVariant": "editorial",
  "showOtter": true
}/*EDITMODE-END*/;

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Chrome.jsx"></script>
<script type="text/babel" src="components/Landing.jsx"></script>
<script type="text/babel" src="components/Features.jsx"></script>
<script type="text/babel" src="components/Pricing.jsx"></script>
<script type="text/babel" src="components/Feed.jsx"></script>
<script type="text/babel" src="components/Help.jsx"></script>
<script type="text/babel" src="components/Privacy.jsx"></script>
<script type="text/babel" src="components/Terms.jsx"></script>
<script type="text/babel" src="components/Tutorial.jsx"></script>
<script type="text/babel" src="components/Signup.jsx"></script>
<script type="text/babel" src="components/Blog.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function parseHash() {
  const hash = window.location.hash.slice(1);
  if (hash.startsWith('blog/')) return { route: 'blog-post', slug: hash.slice(5) };
  return { route: hash || 'home', slug: null };
}

function App() {
  const [route, setRoute] = useState(() => parseHash().route);
  const [tweaks, setTweaks] = useState(window.__TWEAKS);
  const [currentPost, setCurrentPost] = useState(() => {
    const { slug } = parseHash();
    return slug ? (window.POSTS || []).find(p => p.slug === slug) || null : null;
  });

  useEffect(() => {
    const hashVal = route === 'home'      ? '' :
                    route === 'blog-post' && currentPost ? `blog/${currentPost.slug}` :
                    route;
    window.history.pushState(null, '', hashVal ? `#${hashVal}` : location.pathname);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [route, currentPost]);

  useEffect(() => {
    function onNav() {
      const { route: r, slug } = parseHash();
      if (slug) {
        const post = (window.POSTS || []).find(p => p.slug === slug);
        if (post) setCurrentPost(post);
      }
      setRoute(r);
    }
    window.addEventListener('popstate', onNav);
    window.addEventListener('hashchange', onNav);
    return () => {
      window.removeEventListener('popstate', onNav);
      window.removeEventListener('hashchange', onNav);
    };
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
  }, [tweaks.theme]);

  const page = (
    route === 'home'      ? <Landing setRoute={setRoute} heroVariant={tweaks.heroVariant} showOtter={tweaks.showOtter} /> :
    route === 'features'  ? <Features setRoute={setRoute} /> :
    route === 'pricing'   ? <Pricing setRoute={setRoute} /> :
    route === 'feed'      ? <Feed /> :
    route === 'help'      ? <Help setRoute={setRoute} /> :
    route === 'privacy'   ? <Privacy setRoute={setRoute} /> :
    route === 'terms'     ? <Terms setRoute={setRoute} /> :
    route === 'tutorial'  ? <Tutorial setRoute={setRoute} /> :
    route === 'blog'      ? <BlogList setRoute={setRoute} setPost={setCurrentPost} /> :
    route === 'blog-post' ? <BlogPost post={currentPost} setRoute={setRoute} /> :
    <Signup setRoute={setRoute} />
  );

  return (
    <>
      <Nav route={route} setRoute={setRoute} showOtter={tweaks.showOtter} />
      <main data-screen-label={route}>{page}</main>
      {route !== 'signup' && <Footer setRoute={setRoute} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
